name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build Product Service
        run: docker build -t azmathyta/shop-product-svc:${{ github.sha }} ./services/product
        
      - name: Push to DockerHub
        run: docker push azmathyta/shop-product-svc:${{ github.sha }}

  deploy-to-eks:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install ArgoCD CLI
        run: curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64 && sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
        
      - name: Sync ArgoCD App
        run: argocd app sync shop-app --auth-token ${{ secrets.ARGOCD_TOKEN }} --server argocd.example.com
